# Dokploy / Nixpacks build for the FastAPI backend (root dir: api/).
# aptPkgs: Tesseract for OCR. Install/start are left to Nixpacks Python detection
# (requirements.txt) except for the start command below.

[phases.setup]
aptPkgs = ["tesseract-ocr", "tesseract-ocr-eng"]

[start]
cmd = "sh start.sh"
